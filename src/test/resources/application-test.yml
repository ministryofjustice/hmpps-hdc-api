server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

hmpps:
  auth:
    token:
      url: http://localhost:8090/auth/oauth/token
    url: http://localhost:8090/auth
  prison:
    api:
      url: http://localhost:8091/api
  prisonersearch:
    api:
      url: http://localhost:8099/api

  sar:
    tests:
      # This was implemented in reverse, it's been fixed in the latest version of the sar library so will need to be reversed then.
      attachments-expected: true
      # When changing expected schema version this should act as a prompt to consider whether SAR requires updating
      #check with the rest of the team to see if this required
      expected-flyway-schema-version: "01"
      expected-jpa-entity-schema:
        path: /sar/entity-schema.json
      expected-api-response:
        path: /sar/sar-api-response.json
      expected-render-result:
        path: /sar/sar-generated-report.html

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hmpps-hdc-api?sslmode=prefer
    username: licences
    password: hmpps-hdc-api

  flyway:
    locations: classpath:/migration/common,/migration/{vendor}
    url: jdbc:postgresql://localhost:5432/hmpps-hdc-api?sslmode=prefer
    user: licences
    password: hmpps-hdc-api
    enabled: true

  main:
    allow-bean-definition-overriding: true

  jpa:
    show-sql: true

hmpps.sqs:
  provider: localstack
  localstackUrl: http://localhost:4566
  queues:
    domaineventsqueue:
      queueName: domainevents-queue
      dlqName: domainevents-queue-dlq
      subscribeTopicId: domainevents
  topics:
    domainevents:
      arn: arn:aws:sns:eu-west-2:000000000000:domainevents-topic
